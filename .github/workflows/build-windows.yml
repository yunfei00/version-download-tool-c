name: Build Windows EXE

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW-w64
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Build
        shell: cmd
        run: |
          gcc src\main.c src\app.c src\downloader.c resources\app.rc -o version-download-tool.exe -mwindows -lcomctl32 -lwinhttp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-download-tool-windows
          path: version-download-tool.exe

      - name: Create release and upload exe
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: version-download-tool.exe
          generate_release_notes: true
