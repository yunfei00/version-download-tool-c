name: build-windows

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
      - name: Build
        shell: cmd
        run: build.bat
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-download-tool
          path: version-download-tool.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: version-download-tool.exe
